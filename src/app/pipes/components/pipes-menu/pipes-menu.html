<nav class="mb-2">
  <ul
    class="menu menu-vertical lg:menu-horizontal md:menu-horizontal sm:menu-horizontal bg-base-200 rounded-box"
  >
    @for (route of routes; track route.path) {
      <li>
        <a [routerLink]="route.path" routerLinkActive="text-accent">{{ route.title }}</a>
      </li>
    }
  </ul>
</nav>
